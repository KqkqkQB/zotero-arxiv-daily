zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: gpt-4o-mini

source:
  semantic_scholar:
    # Search each query separately, then merge and deduplicate the results.
    queries:
      - medical image segmentation
      - medical image analysis
      - PET MRI
      - positron emission tomography magnetic resonance
      - semi supervised segmentation
      - semi supervised medical image segmentation
      - multimodal medical image segmentation

    # Journal/conference papers from the recent one to two years.
    year_from: 2025
    year_to: null

    # Keep this modest to avoid API rate limits.
    limit: 50
    api_key: ${oc.env:SEMANTIC_SCHOLAR_API_KEY,null}

    # Keep journal and conference papers.
    publication_types:
      - JournalArticle
      - Conference

    # Abstracts improve embedding-based reranking.
    require_abstract: true

    # Require a journal/conference venue.
    require_venue: true

    # Leave unrestricted first to avoid filtering out useful papers.
    venue_filter: null

  arxiv:
    category: ["cs.CV", "cs.AI", "cs.LG"]
    include_cross_list: true
    days_back: 1

  biorxiv:
    category: null

  medrxiv:
    category: null

executor:
  debug: ${oc.env:DEBUG,null}
  send_empty: false
  source: ["arxiv", "semantic_scholar"]
